name: ics-authorization-modernization
version: 1.0.0
description: >
  ECIF-guided modernization workflow for an ICS authorization module.
stages:
  - id: intake
    owner: modernization-coordinator
    output: artifact-manifest.json
  - id: legacy-understanding
    owner: legacy-analyzer
    input: artifact-manifest.json
    output: legacy-understanding.json
  - id: business-rule-extraction
    owner: business-rule-extractor
    input: legacy-understanding.json
    output: business-rules.json
  - id: target-mapping
    owner: target-architect
    input: business-rules.json
    output: target-mapping.json
  - id: code-generation
    owner: code-generator
    input: target-mapping.json
    output: code-package.json
  - id: review-hardening
    owner: reviewer-hardener
    input: code-package.json
    output: review-report.json
  - id: approval-package
    owner: modernization-coordinator
    input: [legacy-understanding.json, business-rules.json, target-mapping.json, review-report.json]
    output: approval-package.zip
controls:
  human_approval_points:
    - after: business-rule-extraction
    - after: target-mapping
    - before: approval-package
  audit_required: true
  pii_prompt_check: required
  traceability_required: true
